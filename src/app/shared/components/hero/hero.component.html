<section class="hero container section">
  <div class="hero__content">
    <p class="hero__eyebrow">Műkörmös időpontfoglalás egyszerűen</p>
    <h1>{{ title }}</h1>
    <p class="hero__text">{{ subtitle }}</p>
    <div class="hero__actions">
      <a class="button button-primary" routerLink="/booking">Foglalok időpontot</a>
      <a class="button" routerLink="/services">Szolgáltatások</a>
    </div>
  </div>

  <div class="hero__image card">
    <img
      src="https://images.unsplash.com/photo-1604654894610-df63bc536371?auto=format&fit=crop&w=900&q=80"
      alt="Rózsaszín műköröm minta"
    />
  </div>
</section>
